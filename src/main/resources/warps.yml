# Варпы (warps.yml)

# У каждой location должно быть исключительно 6 сегментов:
# один Мир, три координаты по X, Y и Z, а также
# две координаты направления взгляда (Yaw и Pitch).
# Разделять сегменты необходимо с помощью пробелов.

# Все варпы доступны любому игроку с разрешением по команде /warp.

# Список варпов
# Названия НЕ чувствительны к регистру!
warps:
    # Локация Хаба
    hub: 'world 0.5 100.0 0.5 180.0 0.0'
