# Разрешения (permissions.yml)

# Разрешает использование команды /vanish
vanishUse: "vanish.use"
# Разрешает использовать режим невидимости на себе.
vanishMe: "vanish.me"
# Разрешает использовать режим невидимости на других.
vanishOthers: "vanish.others"
# Разрешает доступ к инвентарю кликнутого игрока во время режима невидимости.
# Позволяет не только смотреть, но и изменять содержимое его инвентаря.
vanishInventory: "vanish.inventory"

# Разрешает использование команды /warp
warpUse: "warp.use"
# Разрешает телепортировать себя по варпам
warpMe: "warp.me"
# Разрешает телепортировать других на варпы
warpOthers: "warp.others"

# Разрешает кикать игроков
kickUse: "kick.use"

# Разрешает убивать игроков
killUse: "kill.use"

# Разрешает использовать режим полёта
flyUse: "fly.use"
