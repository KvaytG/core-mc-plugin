# Сообщения (messages.yml)

# Каждое из сообщений можно оставить пустым,
# тогда оно просто не будет выводиться.

# Плейсхолдеры:
# {PLAYER} — ник игрока.
# {ALIAS} — введённая команда
# {REASON} — причина чего-либо.
# {WARP} — варп

# Отсутствие прав на использование чего-либо
noAccess: "&cУ вас недостаточно прав"
# Указанный игрок не найден
playerNotFound: "&cПользователь {PLAYER} не найден"

# Включение режима невидимости для себя
vanishHideMe: "&eВы &aвключили &eрежим невидимости"
# Отключение режима невидимости для себя
vanishShowMe: "&eВы &cвыключили &eрежим невидимости"
# Включение режима невидимости для другого игрока
vanishHideOther: "&eВы &aвключили &eрежим невидимости для игрока {PLAYER}"
# Отключение режима невидимости для другого игрока
vanishShowOther: "&eВы &cвыключили &eрежим невидимости для игрока {PLAYER}"
# Для игрока, которому кто-то включил режим невидимости
vanishOthersHide: "&eПользователь {PLAYER} &aвключил &eвам режим невидимости"
# Для игрока, которому кто-то отключил режим невидимости
vanishOthersShow: "&eПользователь {PLAYER} &cвыключил &eвам режим невидимости"

# Правильное использование /warp
warpUsage: "&cИспользование: /{ALIAS} <название> [игрок]"
# Указанный варп не найден
warpNotFound: "&cВарп {WARP} не найден"
# Телепортация другого игрока на варп
warpOther: "&eВы телепортировали игрока {PLAYER} на {WARP}"

# Правильное использование /kick
kickUsage: "&cИспользование: /{ALIAS} <игрок|@all> <причина>"
# Кик другого игрока
kickOther: "&eВы кикнули игрока {PLAYER} по причине {REASON}"

# Правильное использование /kill
killUsage: "&cИспользование: /{ALIAS} <игрок|@all>"
# Убийство другого игрока
killOther: "&eВы убили игрока {PLAYER}"

# Включение режима полёта
flyOn: "&eВы &aвключили &eрежим полёта"
# Отключение режима полёта
flyOff: "&eВы &cвыключили &eрежим полёта"
