# Сообщения (messages.yml)

# Каждое из сообщений можно оставить пустым,
# тогда оно просто не будет выводиться.

# Плейсхолдеры:
# {PLAYER} — ник игрока.
# {ALIAS} — введённая команда
# {REASON} — причина чего-либо.
# {WARP} — варп

# Отсутствие прав на использование чего-либо
noAccess: "&#FF0000У вас недостаточно прав"
# Указанный игрок не найден
playerNotFound: "&#FF0000Пользователь {PLAYER} не найден"

# Включение режима невидимости для себя
vanishHideMe: "&#FFFF31Вы &aвключили &#FFFF31режим невидимости"
# Отключение режима невидимости для себя
vanishShowMe: "&#FFFF31Вы &#FF0000выключили &#FFFF31режим невидимости"
# Включение режима невидимости для другого игрока
vanishHideOther: "&#FFFF31Вы &aвключили &#FFFF31режим невидимости для игрока {PLAYER}"
# Отключение режима невидимости для другого игрока
vanishShowOther: "&#FFFF31Вы &#FF0000выключили &#FFFF31режим невидимости для игрока {PLAYER}"
# Для игрока, которому кто-то включил режим невидимости
vanishOthersHide: "&#FFFF31Пользователь {PLAYER} &aвключил &#FFFF31вам режим невидимости"
# Для игрока, которому кто-то отключил режим невидимости
vanishOthersShow: "&#FFFF31Пользователь {PLAYER} &#FF0000выключил &#FFFF31вам режим невидимости"

# Правильное использование /warp
warpUsage: "&#FF0000Использование: /{ALIAS} <название> [игрок]"
# Указанный варп не найден
warpNotFound: "&#FF0000Варп {WARP} не найден"
# Телепортация другого игрока на варп
warpOther: "&#FFFF31Вы телепортировали игрока {PLAYER} на {WARP}"

# Правильное использование /kick
kickUsage: "&#FF0000Использование: /{ALIAS} <игрок|@all> <причина>"
# Кик другого игрока
kickOther: "&#FFFF31Вы кикнули игрока {PLAYER} по причине {REASON}"

# Правильное использование /kill
killUsage: "&#FF0000Использование: /{ALIAS} <игрок|@all>"
# Убийство другого игрока
killOther: "&#FFFF31Вы убили игрока {PLAYER}"

# Включение режима полёта
flyOn: "&#FFFF31Вы &aвключили &#FFFF31режим полёта"
# Отключение режима полёта
flyOff: "&#FFFF31Вы &#FF0000выключили &#FFFF31режим полёта"
